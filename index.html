<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Commander</title>
  </head>
  <body>
    <div id="game-container"></div>

    <!-- Title / Start screen -->
    <div id="start-menu" class="hidden">
      <h1>MATH COMMANDER</h1>
      <p class="menu-tagline">Defend the sector. Do the math.</p>
      <button id="start-btn">ENGAGE</button>
    </div>

    <!-- Level-complete interstitial (auto-dismissed) -->
    <div id="level-complete" class="hidden">
      <div id="lc-card">
        <div id="lc-label">SECTOR CLEARED</div>
        <div id="lc-name"></div>
        <div id="lc-next"></div>
        <div id="lc-bar"><div id="lc-bar-fill"></div></div>
      </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden">
      <div id="end-card">
        <div id="end-title">VICTORY</div>
        <div id="end-subtitle"></div>
        <div id="end-score"></div>
        <button id="play-again-btn">PLAY AGAIN</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
