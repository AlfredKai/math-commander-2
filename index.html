<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Commander</title>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="start-menu" class="hidden">
      <h1>MATH COMMANDER</h1>
      
      <div class="setting-group">
        <label for="enemy-volume">Max Enemy Volume: <span id="volume-val">4</span></label>
        <input type="range" id="enemy-volume" min="1" max="10" step="1" value="4">
      </div>
      
      <div class="setting-group">
        <label for="enemy-speed">Base Enemy Speed: <span id="speed-val">0.6</span></label>
        <input type="range" id="enemy-speed" min="0.2" max="2.0" step="0.1" value="0.6">
      </div>
      
      <button id="start-btn">ENGAGE</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
